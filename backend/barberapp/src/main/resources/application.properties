spring.application.name=barberapp
# 1. Configurazione Database (Esempio MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/barberapp_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# 2. Configurazione JPA / Hibernate
# 'update' crea le tabelle automaticamente se non esistono
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 3. Configurazione Server
server.port=8080
server.servlet.context-path=/api

# 4. Proprietà Personalizzate per JWT (Opzionale ma consigliato)
# Puoi richiamare queste scritte nel codice usando @Value
app.jwt.secret=QuestaDeveEssereUnaChiaveMoltoLungaESegretaPerLaSicurezza12345
app.jwt.expirationMs=86400000